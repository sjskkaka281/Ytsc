name: Pure GitHub Auto Scraper & Storage

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Agar abhi turant chalana hai toh URL yahan dalein (Varna khali chhod dein)'
        required: false
        default: ''
        
  schedule:
    - cron: '30 23 * * *' # Subah 5:00 AM India Time (IST)

permissions:
  contents: write

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pandas

      - name: Run Scraper Script
        run: python scraper.py "${{ github.event.inputs.video_url }}"

      - name: Save CSV back to GitHub Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # git add . karne se agar koi nayi file bani hogi toh hi add hogi, crash nahi karega
          git add .
          git commit -m "Automated Chat Backup: $(date)" || exit 0
          git push
