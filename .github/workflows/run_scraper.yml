name: Pure GitHub Auto Scraper & Storage

on:
  # 1. Manual run karne ke liye input box khulega
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Agar abhi turant chalana hai toh URL yahan dalein (Varna khali chhod dein)'
        required: false
        default: ''
        
  # 2. Automatic Daily Timer (Subah 5:00 AM IST)
  schedule:
    - cron: '30 23 * * *' # 23:30 UTC yani exact 5:00 AM India Time (IST) next day

permissions:
  contents: write

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pandas

      - name: Run Scraper Script
        # Input Box waala URL python script ko bhej raha hai
        run: python scraper.py "${{ github.event.inputs.video_url }}"

      - name: Save CSV back to GitHub Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add *.csv
          git commit -m "Automated Chat Backup: $(date)" || exit 0
          git push
