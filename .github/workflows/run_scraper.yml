name: Pure GitHub Auto Scraper & Storage

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Link'
        required: false
        default: ''
        
  schedule:
    # 🔥 Yeh har 5 minute me GitHub Action ko automatically run karega
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pandas

      - name: Run Scraper Script
        run: python scraper.py "${{ github.event.inputs.video_url }}"

      - name: Save CSV back to GitHub Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "New Chat Snapshot: $(date)" || exit 0
          git push
